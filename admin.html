<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LA CAJA — Admin</title>
<link rel="icon" type="image/avif" href="../face-a ANGELO/assets-2/CYAN POP.avif" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://use.typekit.net/fqc0vdd.css" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#0a0a0a;
  --blush:#E8A898;
  --cream:#F5F0E8;
  --muted:#7a7060;
  --border:rgba(245,240,232,0.08);
  --green:#7ecfa0;
  --red:#e88888;
}
body{
  background:var(--black);color:var(--cream);
  font-family:'DM Mono',monospace;font-size:14px;
  min-height:100vh;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-size:200px 200px;
}

/* LOGIN */
.login-screen{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:2rem;
}
.login-box{
  width:100%;max-width:360px;
  border:1px solid var(--border);padding:2.5rem;
}
.login-title{
  font-family:'spalla',sans-serif;font-size:1.8rem;
  letter-spacing:0.1em;text-transform:uppercase;
  color:var(--cream);margin-bottom:0.3rem;
}
.login-sub{font-size:0.62rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:2rem}
.login-input{
  width:100%;background:transparent;border:1px solid var(--border);
  color:var(--cream);font-family:'DM Mono',monospace;font-size:0.85rem;
  padding:0.75rem 1rem;outline:none;margin-bottom:1rem;
  letter-spacing:0.1em;
}
.login-input:focus{border-color:rgba(245,240,232,0.3)}
.login-btn{
  width:100%;font-family:'DM Mono',monospace;font-size:0.7rem;
  letter-spacing:0.2em;text-transform:uppercase;
  padding:0.9rem;background:var(--blush);color:var(--black);
  border:none;cursor:pointer;font-weight:500;
}
.login-err{font-size:0.62rem;color:var(--red);letter-spacing:0.1em;margin-top:0.5rem;display:none}
.login-err.show{display:block}

/* MAIN */
.main-screen{display:none}
.main-screen.show{display:block}

/* NAV */
.nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:1.2rem 2rem;border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;
  background:rgba(10,10,10,0.95);backdrop-filter:blur(16px);
}
.nav-logo{font-family:'spalla',sans-serif;font-size:1.2rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--cream)}
.nav-logo span{color:var(--blush)}
.nav-right{display:flex;align-items:center;gap:1.5rem}
.nav-stats{font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted)}
.nav-stats strong{color:var(--cream)}
.btn-logout{
  font-family:'DM Mono',monospace;font-size:0.6rem;
  letter-spacing:0.15em;text-transform:uppercase;
  padding:0.4rem 0.8rem;border:1px solid var(--border);
  background:transparent;color:var(--muted);cursor:pointer;
}
.btn-logout:hover{color:var(--cream);border-color:var(--cream)}
.btn-refresh{
  font-family:'DM Mono',monospace;font-size:0.6rem;
  letter-spacing:0.15em;text-transform:uppercase;
  padding:0.4rem 0.8rem;border:1px solid var(--border);
  background:transparent;color:var(--muted);cursor:pointer;
}
.btn-refresh:hover{color:var(--blush);border-color:var(--blush)}

/* TABS */
.admin-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 2rem}
.atab{
  font-family:'DM Mono',monospace;font-size:0.65rem;
  letter-spacing:0.2em;text-transform:uppercase;
  padding:1rem 0;margin-right:2rem;
  background:none;border:none;color:var(--muted);
  cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;
}
.atab.active{color:var(--blush);border-bottom-color:var(--blush)}

/* TABLE */
.table-wrap{padding:2rem;overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{
  font-size:0.55rem;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--muted);padding:0.6rem 1rem;text-align:left;
  border-bottom:1px solid var(--border);white-space:nowrap;
}
td{
  font-size:0.72rem;letter-spacing:0.04em;
  padding:0.9rem 1rem;border-bottom:1px solid var(--border);
  vertical-align:middle;
}
tr:hover td{background:rgba(245,240,232,0.02)}
.badge{
  display:inline-block;font-size:0.55rem;letter-spacing:0.15em;
  text-transform:uppercase;padding:0.2rem 0.6rem;
}
.badge-pending{border:1px solid rgba(232,168,152,0.3);color:var(--blush)}
.badge-paid{border:1px solid rgba(126,207,160,0.3);color:var(--green)}
.badge-cancelled{border:1px solid rgba(122,112,96,0.3);color:var(--muted)}

.btn-pagado{
  font-family:'DM Mono',monospace;font-size:0.58rem;
  letter-spacing:0.15em;text-transform:uppercase;
  padding:0.35rem 0.8rem;
  background:var(--green);color:var(--black);
  border:none;cursor:pointer;font-weight:500;
  white-space:nowrap;
}
.btn-pagado:hover{opacity:0.85}
.btn-cancel{
  font-family:'DM Mono',monospace;font-size:0.58rem;
  letter-spacing:0.15em;text-transform:uppercase;
  padding:0.35rem 0.8rem;
  background:transparent;color:var(--muted);
  border:1px solid var(--border);cursor:pointer;
  margin-left:0.5rem;white-space:nowrap;
}
.btn-cancel:hover{color:var(--red);border-color:var(--red)}

.wa-link{color:var(--green);text-decoration:none}
.wa-link:hover{text-decoration:underline}

/* EMPTY */
.empty{padding:4rem 2rem;text-align:center;font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted)}

/* LOADING */
.loading{padding:4rem 2rem;text-align:center;font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted)}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h1 class="login-title">LA CAJA <span style="color:var(--blush)">·</span> Admin</h1>
    <p class="login-sub">Angelo Studio — Acceso restringido</p>
    <div style="position:relative;margin-bottom:1rem">
      <input class="login-input" type="password" id="pwInput" placeholder="Contraseña" style="margin-bottom:0;padding-right:3rem" />
      <button id="togglePw" type="button" style="position:absolute;right:0.8rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:0.75rem;letter-spacing:0.1em">SHOW</button>
    </div>
    <button class="login-btn" id="loginBtn">Entrar</button>
    <p class="login-err" id="loginErr">Contraseña incorrecta</p>
  </div>
</div>

<!-- MAIN -->
<div class="main-screen" id="mainScreen">
  <nav class="nav">
    <span class="nav-logo">LA CAJA <span>·</span> Admin</span>
    <div class="nav-right">
      <span class="nav-stats" id="navStats">—</span>
      <button class="btn-refresh" id="btnRefresh">↻ Actualizar</button>
      <button class="btn-logout" id="btnLogout">Salir</button>
    </div>
  </nav>

  <div class="admin-tabs">
    <button class="atab active" data-tab="pending">Pendientes de pago</button>
    <button class="atab" data-tab="paid">Pagados</button>
    <button class="atab" data-tab="all">Todos</button>
  </div>

  <div class="table-wrap">
    <div class="loading" id="loadingEl">Cargando reservas…</div>
    <table id="adminTable" style="display:none">
      <thead>
        <tr>
          <th>#</th>
          <th>Fecha</th>
          <th>Artista</th>
          <th>Álbum</th>
          <th>Precio</th>
          <th>Nombre</th>
          <th>Cédula</th>
          <th>WhatsApp</th>
          <th>Estado</th>
          <th>Acción</th>
        </tr>
      </thead>
      <tbody id="adminBody"></tbody>
    </table>
    <div class="empty" id="emptyEl" style="display:none">No hay reservas aquí.</div>
  </div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbxZbv1AUBx69gWVFnS6ooihOb1EK7ut2nqG5xkTu3hQz1S6E4MV1yIgXKhbmQEclBI03g/exec';
const PASSWORD_HASH = 'ba50e4a2312a8974cfe6b4cfea0849fc036754b7820932b8d5d73cd5bac7d59a';
async function hashStr(s) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

let allRows = [];
let activeTab = 'pending';

// ── LOGIN ─────────────────────────────────────────────────────────────────────
async function checkLogin() {
  const stored = sessionStorage.getItem('lacaja_admin');
  return stored === PASSWORD_HASH;
}

document.getElementById('loginBtn').addEventListener('click', async () => {
  const pw = document.getElementById('pwInput').value;
  const h = await hashStr(pw);
  if (h === PASSWORD_HASH) {
    sessionStorage.setItem('lacaja_admin', PASSWORD_HASH);
    showMain();
  } else {
    document.getElementById('loginErr').classList.add('show');
  }
});

document.getElementById('pwInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('loginBtn').click();
});

document.getElementById('btnLogout').addEventListener('click', () => {
  sessionStorage.removeItem('lacaja_admin');
  location.reload();
});

// ── MAIN ──────────────────────────────────────────────────────────────────────
function showMain() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainScreen').classList.add('show');
  loadData();
}

async function loadData() {
  document.getElementById('loadingEl').style.display = 'block';
  document.getElementById('adminTable').style.display = 'none';
  document.getElementById('emptyEl').style.display = 'none';
  try {
    const res = await fetch(API + '?admin=1&t=' + Date.now());
    const data = await res.json();
    allRows = data.rows || [];
    renderTable();
  } catch(e) {
    document.getElementById('loadingEl').innerHTML = 'Sin conexión. <button onclick="loadData()" style="background:none;border:none;color:var(--blush);cursor:pointer;font-family:inherit;letter-spacing:0.1em;text-decoration:underline">Reintentar</button>';
  }
}

document.getElementById('btnRefresh').addEventListener('click', loadData);

// ── TABS ──────────────────────────────────────────────────────────────────────
document.querySelectorAll('.atab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.atab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeTab = btn.dataset.tab;
    renderTable();
  });
});

// ── TABLE ─────────────────────────────────────────────────────────────────────
function renderTable() {
  const filtered = allRows.filter(r => {
    if (activeTab === 'pending') return r.estado === 'Pendiente pago';
    if (activeTab === 'paid')    return r.estado === 'Pagado';
    return true;
  });

  const pending = allRows.filter(r => r.estado === 'Pendiente pago').length;
  const paid    = allRows.filter(r => r.estado === 'Pagado').length;
  document.getElementById('navStats').innerHTML =
    `<strong>${paid}</strong> pagados &nbsp;·&nbsp; <strong>${pending}</strong> pendientes`;

  document.getElementById('loadingEl').style.display = 'none';

  if (filtered.length === 0) {
    document.getElementById('adminTable').style.display = 'none';
    document.getElementById('emptyEl').style.display = 'block';
    return;
  }

  document.getElementById('emptyEl').style.display = 'none';
  document.getElementById('adminTable').style.display = 'table';

  const body = document.getElementById('adminBody');
  body.innerHTML = '';
  filtered.forEach((r, i) => {
    const isPending = r.estado === 'Pendiente pago';
    let waRaw = (r.whatsapp || '').replace(/^'+/, '').trim();
    let waNum = waRaw.replace(/\D/g,'');
    if (waNum.length === 10 && waNum.startsWith('3')) waNum = '57' + waNum;
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    const waHref = waNum ? (isMobile ? `whatsapp://send?phone=${waNum}` : `https://wa.me/${waNum}`) : '';
    const waLink = waNum ? `<a class="wa-link" href="${waHref}" target="_blank">${waRaw}</a>` : waRaw || '—';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="color:var(--muted)">${r.rowIndex || i+1}</td>
      <td style="color:var(--muted);white-space:nowrap">${r.timestamp || '—'}</td>
      <td><strong>${esc(r.artista)}</strong></td>
      <td style="color:var(--muted);font-style:italic">${esc(r.album) || '—'}</td>
      <td style="color:var(--blush)">${esc(r.precio)}</td>
      <td>${esc(r.nombre)}</td>
      <td style="color:var(--muted)">${esc(r.cedula)}</td>
      <td>${waLink}</td>
      <td><span class="badge ${isPending ? 'badge-pending' : 'badge-paid'}">${r.estado}</span></td>
      <td>
        ${isPending ? `<button class="btn-pagado" data-row="${r.rowIndex}" data-nombre="${esc(r.nombre)}" data-artista="${esc(r.artista)}" data-album="${esc(r.album)}" data-precio="${esc(r.precio)}" data-wa="${waNum}">✓ Pagado</button>` : ''}
        ${isPending ? `<button class="btn-cancel" data-row="${r.rowIndex}">✕ Cancelar</button>` : ''}
      </td>`;
    body.appendChild(tr);
  });

  body.querySelectorAll('.btn-pagado').forEach(btn => {
    btn.addEventListener('click', () => {
      const { row, nombre, artista, album, precio, wa } = btn.dataset;
      updateStatus(parseInt(row), 'Pagado', btn, () => {
        const msg = encodeURIComponent(
          `¡Hola ${nombre}! 🎵\n\nTu pago fue confirmado. Tu vinilo está reservado:\n\n*${artista}${album ? ' — ' + album : ''}*\n$${Number(precio).toLocaleString('es-CO')}\n\nLo recogés personalmente en *FACE A* el *3 de Julio, 2026* — Casa del Ángel, El Retiro.\n\n¡Nos vemos esa noche! — Angelo Studio`
        );
        const waUrl = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent)
          ? `whatsapp://send?phone=${wa}&text=${msg}`
          : `https://wa.me/${wa}?text=${msg}`;
        window.open(waUrl, '_blank');
      });
    });
  });
  body.querySelectorAll('.btn-cancel').forEach(btn => {
    btn.addEventListener('click', () => {
      if (confirm('¿Cancelar esta reserva? El registro se eliminará de la hoja.')) {
        updateStatus(parseInt(btn.dataset.row), 'Cancelado', btn);
      }
    });
  });
}

async function updateStatus(rowIndex, newStatus, btn, onSuccess) {
  btn.disabled = true;
  btn.textContent = '…';
  try {
    const res = await fetch(API, {
      method: 'POST',
      body: JSON.stringify({ action: 'updateStatus', rowIndex, status: newStatus })
    });
    const data = await res.json();
    if (data.ok) {
      if (onSuccess) onSuccess();
      loadData();
    } else {
      alert('Error al actualizar. Intenta de nuevo.');
      btn.disabled = false;
      btn.textContent = newStatus === 'Pagado' ? '✓ Pagado' : '✕ Cancelar';
    }
  } catch(e) {
    alert('Error de conexión.');
    btn.disabled = false;
  }
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── SHOW/HIDE PASSWORD ───────────────────────────────────────────────────────
document.getElementById('togglePw').addEventListener('click', function() {
  const input = document.getElementById('pwInput');
  const isHidden = input.type === 'password';
  input.type = isHidden ? 'text' : 'password';
  this.textContent = isHidden ? 'HIDE' : 'SHOW';
});

// ── INIT ──────────────────────────────────────────────────────────────────────
checkLogin().then(ok => { if (ok) showMain(); });
</script>
</body>
</html>
